[project]
name = "JCheng"
version = "0.1.0"
description = "玖诚电器ERP移动端"
readme = "README.md"
requires-python = ">=3.10"
authors = [
    { name = "jiuchengERP", email = "ywxing79523@163.com" }
]

dependencies = [
    "flet==0.85.3",
    "mysql-connector-python",
    "Pillow",
    "numpy",
    "reportlab",
    "appdirs",
    "requests"
]

[tool.flet]
org = "com.jiuchengcompany.jiuchengapp"
product = "玖诚ERP"
copyright = "Copyright (C) 2023-2026 by jiucheng"

# 安卓专属配置：静态权限声明
[tool.flet.android]
permissions = [
    "CAMERA",
    "READ_MEDIA_IMAGES",
    "READ_EXTERNAL_STORAGE",
    "WRITE_EXTERNAL_STORAGE",
    "INTERNET"
]
min_sdk_version = 21
target_sdk_version = 34

[tool.flet.app]
path = "src"
# 若入口文件不是 main.py，取消注释并指定
# entry_point = "jiuchengMerp:main"
