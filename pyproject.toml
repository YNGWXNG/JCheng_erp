[project]
name = "JCheng"
version = "0.1.0"
description = "玖诚电器ERP移动端"
readme = "README.md"
requires-python = ">=3.10"
authors = [
    { name = "jiuchengERP", email = "ywxing79523@163.com" }
]

# 本地电脑开发/调试依赖（flet run 生效，打包APK不会自动读取）
dependencies = [
    "flet==0.85.3",
    "mysql-connector-python",
    "Pillow",
    "numpy",
    "reportlab",
    "appdirs",
    "requests"
]

# Flet打包专用依赖（打包Android/Windows/iOS时自动嵌入内置Python，解决手机缺模块）
[tool.flet.dependencies]
packages = [
    "flet==0.85.3",
    "mysql-connector-python",
    "Pillow",
    "numpy",
    "reportlab",
    "appdirs",
    "requests",
    "certifi"
]

[tool.flet]
org = "com.jiuchengcompany.jiuchengapp"
product = "JCheng"
copyright = "Copyright (C) 2023-2026 by jiucheng"

# Android 打包配置：权限、最低/目标SDK版本
[tool.flet.android]
permissions = [
    "CAMERA",
    "READ_MEDIA_IMAGES",
    "READ_EXTERNAL_STORAGE",
    "WRITE_EXTERNAL_STORAGE",
    "INTERNET"
]
min_sdk_version = 24
target_sdk_version = 34

# 应用源码入口配置
[tool.flet.app]
path = "src"
# 若你的主程序不是 src/main.py，取消下一行注释并修改文件名
# entry_point = "jiuchengMerp:main"
