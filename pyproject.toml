[project]
name = "JCheng"
version = "0.1.0"
description = "玖诚电器ERP移动端"
readme = "README.md"
requires-python = ">=3.10"
authors = [
    { name = "jiuchengERP", email = "ywxing79523@163.com" }
]

# 本地电脑开发依赖
dependencies = [
    "flet==0.85.3",
    "mysql-connector-python",
    "Pillow",
    "numpy",
    "reportlab",
    "appdirs",
    "requests"
]

# APK打包内置依赖（手机运行自带）
[tool.flet.dependencies]
packages = [
    "flet==0.85.3",
    "mysql-connector-python",
    "Pillow",
    "numpy",
    "reportlab",
    "appdirs",
    "requests",
    "certifi"
]

[tool.flet]
org = "com.jiuchengcompany.jiuchengapp"
product = "JCheng"
copyright = "Copyright (C) 2023-2026 by jiucheng"

[tool.flet.android]
permissions = [
    "CAMERA",
    "READ_MEDIA_IMAGES",
    "READ_EXTERNAL_STORAGE",
    "WRITE_EXTERNAL_STORAGE",
    "INTERNET"
]
min_sdk_version = 24
target_sdk_version = 34

[tool.flet.app]
path = "src"
# entry_point = "main:main"
