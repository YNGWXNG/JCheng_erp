[project]
name = "JCheng"
version = "0.1.1"
description = "玖诚电器ERP移动端"
readme = "README.md"
requires-python = ">=3.10"
authors = [
    { name = "jiuchengERP", email = "ywxing79523@163.com" }
]

# 本地开发依赖
dependencies = [
    "flet>=0.85.3",
    "mysql-connector-python",
    "Pillow",
    "numpy",
    "reportlab",
    "appdirs",
    "requests",
    "pyzbar"
]

# Flet 0.85.3 打包APK唯一读取的依赖配置，必须写全所有需要内置的包（含certifi）
[tool.flet.dependencies]
packages = [
    "flet>=0.85.3",
    "mysql-connector-python",
    "Pillow",
    "numpy",
    "reportlab",
    "appdirs",
    "requests",
    "certifi",
    "pyzbar"
]

[tool.flet]
org = "com.jiuchengcompany.jiuchengapp"
product = "JCheng"
copyright = "Copyright (C) 2023-2026 by jiucheng"

[tool.flet.android]
permissions = [
    "CAMERA",
    "READ_MEDIA_IMAGES",
    "READ_EXTERNAL_STORAGE",
    "WRITE_EXTERNAL_STORAGE",
    "INTERNET"
]
min_sdk_version = 24
target_sdk_version = 34

[tool.flet.app]
path = "src"
