name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 手动触发

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 1. 先安装 Flutter（必须放在最前面，所有flutter命令之前）
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          cache: true

      # 2. 安装Python、uv、全局flet
      - name: Install Python dependencies
        run: |
          pip install uv flet
          uv sync

      # 3. 现在flutter命令已存在，自动同意安卓证书
      - name: Accept Android SDK Licenses
        run: |
          yes | flutter doctor --android-licenses

      # 4. 打包APK，修复minSdk21报错
      - name: Build APK arm64
        run: |
          flet build apk --yes --android-min-sdk 23 \
            --flutter-build-args "--target-platform android-arm64"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jiucheng-apk
          path: build/apk/*.apk
