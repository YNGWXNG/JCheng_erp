name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FLET_VERSION: "0.85.3"
  FLUTTER_TARGET: "android-arm64"
  APK_OUTPUT_PATH: build/flutter/build/app/outputs/flutter-apk

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Cache Flutter & Android & Pub Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.flutter
            ~/.android
            ~/.pub-cache
          key: flutter-3.41.7-flet-${{ env.FLET_VERSION }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install fixed version Flet & export python site-packages
        run: |
          pip install flet==${{ env.FLET_VERSION }}
          flet --version
          echo "SERIOUS_PYTHON_SITE_PACKAGES=$(python3 -c 'import site; print(site.getsitepackages()[0])')" >> $GITHUB_ENV

      - name: Setup Flutter SDK 3.41.7
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          cache: false

      - name: Accept all Android SDK Licenses
        run: |
          yes | flutter doctor --android-licenses
          flutter doctor -v

      # 1. 生成工程，强制携带certifi依赖
      - name: Generate Flet Flutter Android Project
        run: flet build apk --yes --add-package certifi || true

      # 2. 增加目录存在判断，不存在则跳过gradle.properties修改，不阻断流程
      - name: Fix duplicate libapp.so packaging conflict
        run: |
          if [ -d "build/flutter/android" ]; then
            cd build/flutter/android
            echo "android.packaging.jniLibs.pickFirsts=**/libapp.so" >> gradle.properties
            cat gradle.properties
            cd ../../../
          else
            echo "目录 build/flutter/android 不存在，跳过打包冲突修复"
          fi

      # 3. 编译Release APK，直接使用shell环境变量消除IDE警告
      - name: Build Release APK
        run: |
          cd build/flutter
          export SERIOUS_PYTHON_SITE_PACKAGES="$SERIOUS_PYTHON_SITE_PACKAGES"
          flutter build apk --target-platform ${{ env.FLUTTER_TARGET }} --release

      - name: List generated APK files
        run: ls -la ${{ env.APK_OUTPUT_PATH }}

      - name: Upload built APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiucheng-erp-apk-release
          path: ${{ env.APK_OUTPUT_PATH }}/*.apk
          retention-days: 30
