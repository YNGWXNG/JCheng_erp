name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          cache: true

      - name: Install Flet
        run: |
          pip install flet

      - name: Accept Android SDK Licenses
        run: |
          yes | flutter doctor --android-licenses

      - name: Generate Flutter project with flet (allow failure)
        run: |
          flet build apk --yes \
            --flutter-build-args=--target-platform \
            --flutter-build-args=android-arm64 || true

      - name: Fix Gradle duplicatesStrategy (append to build.gradle.kts)
        run: |
          cd build/flutter/android/app
          # 删除之前可能追加的错误行（如果有）
          sed -i '/tasks.withType<Copy>().configureEach/d' build.gradle.kts
          # 在文件末尾追加正确的配置
          echo 'tasks.withType<Copy>().configureEach {' >> build.gradle.kts
          echo '    duplicatesStrategy = DuplicatesStrategy.INCLUDE' >> build.gradle.kts
          echo '}' >> build.gradle.kts
          cd ../../../..

      - name: Build APK with Flutter
        run: |
          cd build/flutter
          flutter build apk --target-platform android-arm64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jiucheng-apk
          path: build/flutter/build/app/outputs/flutter-apk/*.apk
