name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FLET_VERSION: "0.85.3"

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Cache Flutter & Android & Pub Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.flutter
            ~/.android
            ~/.pub-cache
          key: flutter-3.41.7-flet-${{ env.FLET_VERSION }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flet
        run: |
          pip install flet==${{ env.FLET_VERSION }}
          flet --version

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          cache: false

      - name: Accept Android SDK Licenses
        run: |
          yes | flutter doctor --android-licenses
          flutter doctor -v

      # 1. 首次构建（允许失败，只为了生成项目结构）
      - name: Generate Flutter project
        run: flet build apk --yes || true

      # 2. 修复 Gradle 配置（解决 libapp.so 重复问题）
      - name: Fix duplicate libapp.so
        run: |
          if [ -d "build/flutter/android" ]; then
            cd build/flutter/android
            # 删除旧配置（如果存在）
            sed -i '/android.packaging.jniLibs.pickFirsts/d' gradle.properties 2>/dev/null || true
            # 添加新配置
            echo "android.packaging.jniLibs.pickFirsts=**/libapp.so" >> gradle.properties
            cd ../../../
          fi

      # 3. 第二次构建（完整构建，包含所有依赖）
      - name: Build APK
        run: flet build apk --yes

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jiucheng-erp-apk
          path: build/apk/*.apk
          retention-days: 30
