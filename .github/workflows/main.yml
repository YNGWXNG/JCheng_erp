name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FLET_VERSION: "0.85.3"
  FLUTTER_TARGET: "android-arm64"
  APK_OUTPUT_PATH: build/flutter/build/app/outputs/flutter-apk

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Cache Flutter & Android & Pub Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.flutter
            ~/.android
            ~/.pub-cache
          key: flutter-3.41.7-flet-${{ env.FLET_VERSION }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flet & export site-packages path
        run: |
          pip install flet==${{ env.FLET_VERSION }}
          flet --version
          echo "SERIOUS_PYTHON_SITE_PACKAGES=$(python3 -c 'import site; print(site.getsitepackages()[0])')" >> $GITHUB_ENV

      - name: Setup Flutter 3.41.7
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          cache: false

      - name: Accept Android SDK Licenses
        run: |
          yes | flutter doctor --android-licenses
          flutter doctor -v

      # 关键修改：移除 || true，暴露真实生成失败原因，方便排查
      - name: Generate Flet Android Project (Generate full flutter project)
        run: |
          echo "Start generate flutter android project..."
          flet build apk --yes --add-package certifi
          echo "Generate finished, list root dir:"
          ls -la ./
          echo "List build folder:"
          ls -la ./build || echo "build folder not created!"

      # 校验核心目录，不存在直接终止工作流，打印日志
      - name: Check build/flutter folder exists
        run: |
          if [ ! -d "./build/flutter" ]; then
            echo "ERROR: build/flutter directory missing, generate step failed!"
            exit 1
          fi
          echo "build/flutter directory exists, continue..."

      # 修复libapp.so重复冲突，带目录判断
      - name: Fix libapp.so duplicate conflict
        run: |
          if [ -d "./build/flutter/android" ]; then
            cd build/flutter/android
            echo "android.packaging.jniLibs.pickFirsts=**/libapp.so" >> gradle.properties
            echo "==== gradle.properties content ===="
            cat gradle.properties
            cd ../../../
          else
            echo "Warning: build/flutter/android folder missing, skip packaging fix"
          fi

      # 编译Release APK，增加目录前置校验
      - name: 玖诚 APK
        run: |
          if [ ! -d "./build/flutter" ]; then
            echo "ERROR: build/flutter not found, abort build!"
            exit 1
          fi
          cd build/flutter
          export SERIOUS_PYTHON_SITE_PACKAGES="$SERIOUS_PYTHON_SITE_PACKAGES"
          flutter build apk --target-platform $FLUTTER_TARGET --release

      - name: List built APK files
        run: |
          if [ -d "$APK_OUTPUT_PATH" ]; then
            ls -la $APK_OUTPUT_PATH
          else
            echo "APK output folder not found!"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiucheng-erp-apk-release
          path: ${{ env.APK_OUTPUT_PATH }}/*.apk
          retention-days: 30
