name: Build Android APK

# 触发条件
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 全局环境变量统一管理版本/路径
env:
  FLET_VERSION: "0.85.3"
  FLUTTER_TARGET: "android-arm64"
  APK_OUTPUT_PATH: build/flutter/build/app/outputs/flutter-apk

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      # 拉取项目源码
      - name: Checkout source code
        uses: actions/checkout@v4

      # 缓存SDK、依赖包，加速重复构建
      - name: Cache Flutter & Android & Pub Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.flutter
            ~/.android
            ~/.pub-cache
          key: flutter-3.41.7-flet-${{ env.FLET_VERSION }}

      # 配置Python3.11
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 锁定版本安装Flet
      - name: Install fixed version Flet
        run: |
          pip install flet==${{ env.FLET_VERSION }}
          flet --version

      # 配置Flutter SDK
      - name: Setup Flutter 3.41.7
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          cache: false

      # 自动同意Android全部许可协议
      - name: Accept Android SDK Licenses
        run: |
          yes | flutter doctor --android-licenses
          flutter doctor -v

      # 仅生成Flutter工程，不编译
      - name: Generate Flet Flutter Android Project
        run: flet build apk --yes --skip-build

      # 修复Gradle duplicate libapp.so冲突（已修复YAML标红波浪线）
      - name: Fix Gradle packaging duplicate error
        run: |
          cd build/flutter/android/app
          python3 << 'PYEOF'
import re
gradle_file = "build.gradle.kts"
# 读取gradle文件
with open(gradle_file, "r", encoding="utf-8") as f:
    content = f.read()
# 清空原有packaging配置，避免重复插入
content = re.sub(r'packaging\s*\{\n.*?\n\s*\}', "", content, flags=re.DOTALL)
# 待插入的打包去重代码块
packaging_code = '''    packaging {
        jniLibs {
            pickFirsts += "**/libapp.so"
        }
    }
'''
# 在android { 下方插入配置
content = re.sub(r'(android\s*\{\n)', r'\1' + packaging_code, content, flags=re.DOTALL)
# 回写文件
with open(gradle_file, "w", encoding="utf-8") as f:
    f.write(content)
print("✅ Gradle packaging rule inject success")
PYEOF
          cd ../../../

      # 正式编译Release APK
      - name: Build Release APK
        run: |
          cd build/flutter
          flutter build apk --target-platform ${{ env.FLUTTER_TARGET }} --release

      # 打印APK目录，方便排查构建产物
      - name: List generated APK files
        run: ls -la ${{ env.APK_OUTPUT_PATH }}

      # 上传APK为工作流制品，保留30天
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiucheng-apk-release
          path: ${{ env.APK_OUTPUT_PATH }}/*.apk
          retention-days: 30
