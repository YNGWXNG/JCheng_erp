name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 手动触发

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: |
          pip install flet

      - name: Build APK (arm64-v8a)
        run: |
          flet build apk \
            --org com.jiuchengcompany.jiuchengapp \
            --product "JCheng" \
            --flutter-build-args=--target-platform --flutter-build-args=android-arm64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiucheng-apk
          path: build/apk/*.apk
