name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FLET_VERSION: "0.85.3"
  FLUTTER_TARGET: "android-arm64"
  APK_OUTPUT_PATH: build/flutter/build/app/outputs/flutter-apk

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Cache Flutter & Android & Pub Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.flutter
            ~/.android
            ~/.pub-cache
          key: flutter-3.41.7-flet-${{ env.FLET_VERSION }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install fixed version Flet
        run: |
          pip install flet==${{ env.FLET_VERSION }}
          flet --version

      - name: Setup Flutter 3.41.7
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          cache: false

      - name: Accept Android SDK Licenses
        run: |
          yes | flutter doctor --android-licenses
          flutter doctor -v

      - name: Generate Flet Flutter Android Project
        run: flet build apk --yes --skip-build

      # 【修复语法报错核心步骤】单行Python，无多行heredoc，YAML零报错
      - name: Fix Gradle packaging duplicate error
        run: |
          cd build/flutter/android/app
          python3 -c "
import re
f = 'build.gradle.kts'
txt = open(f, 'r', encoding='utf-8').read()
# 清除旧packaging块
txt = re.sub(r'packaging\s*\{\n.*?\n\s*\}', '', txt, flags=re.DOTALL)
# 插入打包规则
insert = '    packaging {\n        jniLibs {\n            pickFirsts += \"**/libapp.so\"\n        }\n    }\n'
txt = re.sub(r'(android\s*\{\n)', r'\1' + insert, txt, flags=re.DOTALL)
open(f, 'w', encoding='utf-8').write(txt)
print('✅ Gradle rule injected')
          "
          cd ../../../

      - name: Build Release APK
        run: |
          cd build/flutter
          flutter build apk --target-platform ${{ env.FLUTTER_TARGET }} --release

      - name: List generated APK files
        run: ls -la ${{ env.APK_OUTPUT_PATH }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiucheng-apk-release
          path: ${{ env.APK_OUTPUT_PATH }}/*.apk
          retention-days: 30
