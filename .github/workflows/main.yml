name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          cache: true

      - name: Install Flet
        run: |
          pip install flet

      - name: Accept Android SDK Licenses
        run: |
          yes | flutter doctor --android-licenses

      - name: Generate Flutter project with flet
        run: |
          flet build apk --yes \
            --flutter-build-args=--target-platform \
            --flutter-build-args=android-arm64 || true

      - name: Fix Gradle duplicatesStrategy
        run: |
          python3 << 'EOF'
          import re
          file_path = 'build/flutter/android/app/build.gradle.kts'
          with open(file_path, 'r') as f:
              content = f.read()
          # 删除 packaging 块（包括 packagingOptions）
          content = re.sub(r'packaging\s*\{[^}]*\}', '', content, flags=re.DOTALL)
          content = re.sub(r'packagingOptions\s*\{[^}]*\}', '', content, flags=re.DOTALL)
          # 在 android { 后插入新的 packaging 块（注意缩进和引号）
          pattern = r'(android\s*\{)'
          replacement = r'\1\n    packaging {\n        jniLibs {\n            pickFirsts += "**/libapp.so"\n        }\n    }'
          content = re.sub(pattern, replacement, content, flags=re.DOTALL)
          with open(file_path, 'w') as f:
              f.write(content)
          print('✅ build.gradle.kts 已修复')
          EOF

      - name: Build APK with Flutter
        run: |
          cd build/flutter
          flutter build apk --target-platform android-arm64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jiucheng-apk
          path: build/flutter/build/app/outputs/flutter-apk/*.apk
