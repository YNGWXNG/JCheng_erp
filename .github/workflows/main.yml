name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 手动触发

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 安装 uv 并同步项目全部依赖
      - name: Install project dependencies
        run: |
          pip install uv
          uv sync

      # 移除 uv run，直接全局执行 flutter
      - name: Accept Android licenses
        run: |
          flutter doctor --android-licenses --yes

      # 打包也去掉 uv run，全局flet，加minSdk23修复报错
      - name: Build APK (arm64-v8a)
        run: |
          flet build apk --yes --android-min-sdk 23 \
            --flutter-build-args "--target-platform android-arm64"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiucheng-apk
          path: build/apk/*.apk
