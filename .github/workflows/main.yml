name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 手动触发

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装系统依赖（pyzbar 条码识别必须）
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzbar0 libzbar-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 安装 uv 并同步项目全部依赖
      - name: Install project dependencies
        run: |
          pip install uv
          uv sync

      # 用 uv run 执行 flet 打包（自动识别虚拟环境）
      - name: Build APK (arm64-v8a)
        run: |
          uv run flet build apk --yes \
            --flutter-build-args=--target-platform \
            --flutter-build-args=android-arm64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiucheng-apk
          path: build/apk/*.apk
