name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FLET_VERSION: "0.85.3"
  FLUTTER_TARGET: "android-arm64"
  APK_OUTPUT_PATH: build/flutter/build/app/outputs/flutter-apk

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Cache Flutter & Android & Pub Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.flutter
            ~/.android
            ~/.pub-cache
          key: flutter-3.41.7-flet-${{ env.FLET_VERSION }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install fixed version Flet
        run: |
          pip install flet==${{ env.FLET_VERSION }}
          flet --version

      - name: Setup Flutter SDK 3.41.7
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          cache: false

      - name: Accept all Android SDK Licenses
        run: |
          yes | flutter doctor --android-licenses
          flutter doctor -v

      # 1. 生成 Flutter 项目（允许失败）
      - name: Generate Flet Flutter Android Project
        run: flet build apk --yes --add-package certifi || true

      # 2. 在 gradle.properties 中添加 pickFirsts 配置，解决 libapp.so 重复
      - name: Fix duplicate libapp.so by gradle.properties
        run: |
          if [ -d "build/flutter/android" ]; then
            cd build/flutter/android
            # 删除旧的配置（如果存在）
            sed -i '/android.packaging.jniLibs.pickFirsts/d' gradle.properties 2>/dev/null || true
            # 添加新配置
            echo "android.packaging.jniLibs.pickFirsts=**/libapp.so" >> gradle.properties
            cat gradle.properties
            cd ../../../
          else
            echo "Directory build/flutter/android does not exist, skipping fix."
          fi

      # 3. 编译 Release APK
      - name: jiucheng APK
        run: |
          cd build/flutter
          flutter build apk --target-platform ${{ env.FLUTTER_TARGET }} --release

      - name: List generated APK files
        run: ls -la ${{ env.APK_OUTPUT_PATH }}

      - name: Upload built APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiucheng-erp-apk-release
          path: ${{ env.APK_OUTPUT_PATH }}/*.apk
          retention-days: 30
