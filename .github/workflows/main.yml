name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FLET_VERSION: "0.85.3"
  FLUTTER_TARGET: "android-arm64"
  APK_OUTPUT_PATH: build/flutter/build/app/outputs/flutter-apk

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Cache Flutter & Android & Pub Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.flutter
            ~/.android
            ~/.pub-cache
          key: flutter-3.41.7-flet-${{ env.FLET_VERSION }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install fixed version Flet
        run: |
          pip install flet==${{ env.FLET_VERSION }}
          flet --version
          # 获取python site-packages路径，存入环境变量
          echo "SERIOUS_PYTHON_SITE_PACKAGES=$(python3 -c 'import site; print(site.getsitepackages()[0])')" >> $GITHUB_ENV

      - name: Setup Flutter 3.41.7
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          cache: false

      - name: Accept Android SDK Licenses
        run: |
          yes | flutter doctor --android-licenses
          flutter doctor -v

      # 生成Flutter工程，忽略构建中途失败
      - name: Generate Flet Flutter Android Project
        run: flet build apk --yes || true

      # 全局配置解决libapp.so重复冲突，不修改gradle.kts
      - name: Fix duplicate libapp.so packaging conflict
        run: |
          cd build/flutter/android
          echo "android.packaging.jniLibs.pickFirsts=**/libapp.so" >> gradle.properties
          cat gradle.properties
          cd ../../../

      # 构建时注入SERIOUS_PYTHON_SITE_PACKAGES环境变量
      - name: Build Release APK
        run: |
          cd build/flutter
          export SERIOUS_PYTHON_SITE_PACKAGES=${{ env.SERIOUS_PYTHON_SITE_PACKAGES }}
          flutter build apk --target-platform ${{ env.FLUTTER_TARGET }} --release

      - name: List generated APK files
        run: ls -la ${{ env.APK_OUTPUT_PATH }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiucheng-apk-release
          path: ${{ env.APK_OUTPUT_PATH }}/*.apk
          retention-days: 30
