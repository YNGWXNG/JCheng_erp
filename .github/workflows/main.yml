name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 手动触发

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 安装 uv 并同步项目全部依赖
      - name: Install project dependencies
        run: |
          pip install uv
          uv sync

      # 接受安卓 SDK 证书，消除构建警告
      - name: Accept Android licenses
        run: |
          uv run flutter doctor --android-licenses --yes

      # 打包APK，指定minSdk=23，arm64架构
      - name: Build APK (arm64-v8a)
        run: |
          uv run flet build apk --yes --android-min-sdk 23 \
            --flutter-build-args "--target-platform android-arm64"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiucheng-apk
          path: build/apk/*.apk
