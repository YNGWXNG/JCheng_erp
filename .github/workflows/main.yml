name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          cache: true

      - name: Install Flet
        run: |
          pip install flet

      - name: Accept Android SDK Licenses
        run: |
          yes | flutter doctor --android-licenses

      # 第一步：生成 Flutter 项目（允许失败）
      - name: Generate Flutter project with flet
        run: |
          flet build apk --yes \
            --flutter-build-args=--target-platform \
            --flutter-build-args=android-arm64 || true

      # 第二步：精确修复 Gradle 配置
      - name: Fix Gradle duplicatesStrategy and Kotlin config
        run: |
          cd build/flutter/android/app
          
          # 删除已有的 packagingOptions 行（如果存在）
          sed -i '/packagingOptions/d' build.gradle.kts
          
          # 在 android { 后插入正确的 packaging 块
          sed -i '/android {/a\
          packaging {\
              jniLibs {\
                  pickFirsts += "**/libapp.so"\
              }\
          }' build.gradle.kts
          
          cd ../../../..

      # 第三步：手动执行 Flutter 构建
      - name: Build APK with Flutter
        run: |
          cd build/flutter
          flutter build apk --target-platform android-arm64

      # 第四步：上传 APK（Flutter 默认输出路径）
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jiucheng-apk
          path: build/flutter/build/app/outputs/flutter-apk/*.apk
