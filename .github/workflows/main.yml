name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FLET_VERSION: "0.85.3"
  FLUTTER_TARGET: "android-arm64"
  APK_OUTPUT_PATH: build/flutter/build/app/outputs/flutter-apk

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Cache Flutter & Android & Pub Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.flutter
            ~/.android
            ~/.pub-cache
          key: flutter-3.41.7-flet-${{ env.FLET_VERSION }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flet & export site-packages path
        run: |
          pip install flet==${{ env.FLET_VERSION }}
          flet --version
          echo "SERIOUS_PYTHON_SITE_PACKAGES=$(python3 -c 'import site; print(site.getsitepackages()[0])')" >> $GITHUB_ENV

      - name: Setup Flutter 3.41.7
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          cache: false

      - name: Accept Android SDK Licenses
        run: |
          yes | flutter doctor --android-licenses
          flutter doctor -v

      # 生成Flutter工程，强制打包certifi，兜底忽略生成阶段报错
      - name: Generate Flet Android Project
        run: flet build apk --yes --add-package certifi || true

      # 增加文件夹判断，不存在则跳过，杜绝cd找不到目录报错
      - name: Fix libapp.so duplicate conflict
        run: |
          if [ -d "./build/flutter/android" ]; then
            cd build/flutter/android
            echo "android.packaging.jniLibs.pickFirsts=**/libapp.so" >> gradle.properties
            echo "==== gradle.properties content ===="
            cat gradle.properties
            cd ../../../
          else
            echo "Warning: build/flutter/android folder missing, skip packaging fix"
          fi

      # 编译Release APK，shell直接读取环境变量，消除IDE模板警告
      - name: Compile Release APK
        run: |
          cd build/flutter
          export SERIOUS_PYTHON_SITE_PACKAGES="$SERIOUS_PYTHON_SITE_PACKAGES"
          flutter build apk --target-platform $FLUTTER_TARGET --release

      - name: List built APK files
        run: ls -la $APK_OUTPUT_PATH

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiucheng-erp-apk-release
          path: ${{ env.APK_OUTPUT_PATH }}/*.apk
          retention-days: 30
